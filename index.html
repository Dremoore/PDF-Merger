<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free PDF Merger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 20px; }

    input, button {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
    }

    #dropZone {
      border: 2px dashed #888;
      padding: 30px;
      margin-bottom: 15px;
      background: #fafafa;
      cursor: pointer;
    }

    #dropZone.dragover {
      background: #e0f7fa;
      border-color: #00796b;
    }

    #fileList {
      list-style: none;
      padding: 0;
      margin-top: 20px;
      text-align: left;
    }

    #fileList li {
      padding: 10px;
      background: #fff;
      margin-bottom: 5px;
      cursor: move;
      border: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #fileList li span {
      flex-grow: 1;
    }
  </style>
</head>
<body>

  <h1>Free PDF Merger</h1>

  <div id="dropZone">
    Drag & Drop PDF files here or click to select
  </div>

  <input type="file" id="pdfFiles" accept="application/pdf" multiple />
  <br>
  <button id="mergeBtn">Merge & Download</button>
  <button id="printBtn" style="display:none;">Print Merged PDF</button>

  <ul id="fileList"></ul>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script>
    const pdfFilesInput = document.getElementById("pdfFiles");
    const fileList = document.getElementById("fileList");
    const mergeBtn = document.getElementById("mergeBtn");
    const printBtn = document.getElementById("printBtn");
    const dropZone = document.getElementById("dropZone");

    let filesArray = [];

    // Drag sorting
    let draggedIndex = null;

    // FILE INPUT (append instead of replace)
    pdfFilesInput.addEventListener("change", () => {
      const newFiles = Array.from(pdfFilesInput.files)
        .filter(file => file.type === "application/pdf");

      filesArray = filesArray.concat(newFiles);
      renderFileList();
    });

    // DROP ZONE CLICK
    dropZone.addEventListener("click", () => {
      pdfFilesInput.click();
    });

    // PREVENT DEFAULT
    ["dragenter", "dragover", "dragleave", "drop"].forEach(event => {
      dropZone.addEventListener(event, e => e.preventDefault());
    });

    // HIGHLIGHT
    ["dragenter", "dragover"].forEach(event => {
      dropZone.addEventListener(event, () => {
        dropZone.classList.add("dragover");
      });
    });

    // REMOVE HIGHLIGHT
    ["dragleave", "drop"].forEach(event => {
      dropZone.addEventListener(event, () => {
        dropZone.classList.remove("dragover");
      });
    });

    // HANDLE DROP
    dropZone.addEventListener("drop", (e) => {
      const droppedFiles = Array.from(e.dataTransfer.files)
        .filter(file => file.type === "application/pdf");

      if (droppedFiles.length === 0) {
        alert("Only PDF files are allowed.");
        return;
      }

      filesArray = filesArray.concat(droppedFiles);
      renderFileList();
    });

    function renderFileList() {
      fileList.innerHTML = '';

      filesArray.forEach((file, index) => {
        const li = document.createElement('li');
        li.draggable = true;

        const span = document.createElement('span');
        span.textContent = file.name;
        li.appendChild(span);

        // Drag reorder
        li.addEventListener("dragstart", () => draggedIndex = index);
        li.addEventListener("dragover", e => e.preventDefault());
        li.addEventListener("drop", () => {
          const temp = filesArray[draggedIndex];
          filesArray[draggedIndex] = filesArray[index];
          filesArray[index] = temp;
          renderFileList();
        });

        fileList.appendChild(li);
      });
    }

    let mergedBlobUrl = null;

    mergeBtn.addEventListener("click", async () => {
      if (filesArray.length < 2) {
        alert("Select at least 2 PDF files.");
        return;
      }

      const mergedPdf = await PDFLib.PDFDocument.create();

      for (const file of filesArray) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
        const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
        copiedPages.forEach((p) => mergedPdf.addPage(p));
      }

      const mergedBytes = await mergedPdf.save();
      const blob = new Blob([mergedBytes], { type: "application/pdf" });

      if (mergedBlobUrl) URL.revokeObjectURL(mergedBlobUrl);
      mergedBlobUrl = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = mergedBlobUrl;
      link.download = "merged.pdf";
      link.click();

      printBtn.style.display = "inline-block";
    });

    printBtn.addEventListener("click", () => {
      if (mergedBlobUrl) {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = mergedBlobUrl;
        document.body.appendChild(iframe);

        iframe.onload = () => {
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        };
      }
    });
  </script>

</body>
</html>
